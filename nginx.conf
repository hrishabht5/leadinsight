# ─────────────────────────────────────────────────────────────────────────────
# LeadPulse — Nginx Production Config
#
# This config:
#   • Serves the built React frontend from /var/www/leadpulse/dist
#   • Proxies /api/* and /webhook/* to the FastAPI backend on port 8000
#   • Handles SSE (disables buffering for /api/v1/leads/stream)
#   • Enables gzip compression
#   • Sets security headers
#   • Redirects HTTP → HTTPS (update server_name to your domain)
# ─────────────────────────────────────────────────────────────────────────────

upstream leadpulse_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name app.leadpulse.io;          # ← Change to your domain
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.leadpulse.io;          # ← Change to your domain

    # SSL — managed by certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/app.leadpulse.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.leadpulse.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # ── Static frontend ────────────────────────────────────────────────────
    root /var/www/leadpulse/dist;
    index index.html;

    # Cache hashed assets forever, don't cache index.html
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── API proxy ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://leadpulse_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # ── SSE — disable buffering for real-time stream ───────────────────────
    location /api/v1/leads/stream {
        proxy_pass         http://leadpulse_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Critical SSE settings
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;   # hold connection for 1 hour
        chunked_transfer_encoding on;
        add_header              X-Accel-Buffering no;
    }

    # ── Webhook ────────────────────────────────────────────────────────────
    location /webhook/ {
        proxy_pass         http://leadpulse_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── SPA fallback — all other routes serve index.html ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
