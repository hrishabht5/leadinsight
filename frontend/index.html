<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

    <!-- SEO -->
    <title>LeadPulse — Real-time Lead Management CRM</title>
    <meta name="description" content="Capture Facebook & Instagram leads in real-time. Respond instantly and convert more with LeadPulse — the modern CRM for social media lead generation." />

    <meta name="author" content="LeadPulse" />
    <meta name="theme-color" content="#080810" />

    <!-- Open Graph -->

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet" />
