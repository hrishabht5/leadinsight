version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# LeadPulse — Full Stack Docker Compose
#
# Services:
#   api       FastAPI backend         → http://localhost:8000
#   frontend  Vite dev server         → http://localhost:3000  (dev profile)
#   redis     In-process SSE pub/sub  → localhost:6379
#   ngrok     Expose webhook to Meta  → http://localhost:4040  (dev profile)
#
# Usage:
#   Production-like:  docker compose up --build
#   Full dev stack:   docker compose --profile dev up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadpulse_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: leadpulse_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  # ── Vite Frontend (dev only) ─────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: leadpulse_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - dev

  # ── ngrok tunnel (dev only — exposes webhook to Meta) ────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    container_name: leadpulse_ngrok
    command: http api:8000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - dev

